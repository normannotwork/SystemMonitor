<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SystemMonitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>

    <div class="container">
        <header>
            <div class="logo-group">
                <span class="logo-icon">⬡</span>
                <h2>System <span class="highlight">Monitor</span></h2>
            </div>
            <div id="status" class="status">
                <span class="pulse"></span> Connecting...
            </div>
        </header>

        <div class="grid">
            <!-- CPU -->
            <div class="card glass">
                <div class="card-header">
                    <span class="icon">🧠</span>
                    <h3>Processor</h3>
                </div>
                <div class="value" id="cpu-val">0.0<span class="unit">%</span></div>
                <div class="bar-bg"><div class="bar-fill neon" id="cpu-bar"></div></div>
            </div>

            <!-- RAM -->
            <div class="card glass">
                <div class="card-header">
                    <span class="icon">💾</span>
                    <h3>Memory</h3>
                </div>
                <div class="value" id="ram-perc">0.0<span class="unit">%</span></div>
                <div class="bar-bg"><div class="bar-fill ram" id="ram-bar"></div></div>
                <div class="sub-info" id="ram-val">0 / 0 MB</div>
            </div>

            <!-- Load Average -->
            <div class="card glass">
                <div class="card-header">
                    <span class="icon">⚙️</span>
                    <h3>Load Average</h3>
                </div>
                <div class="load-group">
                    <div class="load-item">
                        <span class="value small" id="load-val">0.00</span>
                    </div>
                </div>
            </div>

            <!-- Network -->
            <div class="card glass">
                <div class="card-header">
                    <span class="icon">🌐</span>
                    <h3>Network</h3>
                </div>
                <div class="net-stats">
                    <div class="net-row down">
                        <span class="arrow">▼</span>
                        <span class="value small" id="rx-val">0</span>
                        <span class="unit-small">KB/s</span>
                    </div>
                    <div class="net-row up">
                        <span class="arrow">▲</span>
                        <span class="value small" id="tx-val">0</span>
                        <span class="unit-small">KB/s</span>
                    </div>
                </div>
                <div class="pulse-graph" id="net-pulse"></div>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
